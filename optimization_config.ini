# ============================================================================
# Kyotei Prediction Optimization Configuration File
# ============================================================================
# 
# Edit this file to change optimization parameters
# After editing, run run_optimization.ps1 to start optimization
#
# Recommended settings:
#   - First run: MODE=fast, TRIALS=10 (for testing)
#   - Normal run: MODE=medium, TRIALS=20 (recommended)
#   - High precision: MODE=normal, TRIALS=50 (takes time)
#
# ============================================================================

# Optimization mode
# fast: Fast mode (5,000 steps, 1-2 hours)
# medium: Medium mode (25,000 steps, 6-8 hours) ★Recommended
# normal: Normal mode (50,000 steps, 12-15 hours)
MODE=medium

# Number of trials (Optuna optimization trials)
# Recommended: 10-50 (more trials = better accuracy, more time)
TRIALS=20

# Target year-month (YYYY-MM format)
# Examples: 2024-01, 2024-02, 2024-03, 2024-04
# Leave empty for all periods (Warning: takes very long time)
YEAR_MONTH=2024-04

# Virtual environment path
# Usually no change needed
VENV_PATH=venv

# Log directory
# Usually no change needed
LOG_DIR=logs

# Cleanup target days
# Files older than this number of days will be automatically deleted
# Recommended: 7-30 days
CLEANUP_DAYS=7
