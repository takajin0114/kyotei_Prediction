<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>競艇予測結果表示</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/kyotei_predictor/static/css/predictions.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-ship me-2"></i>競艇予測結果表示
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text" id="last-updated">
                    <i class="fas fa-clock me-1"></i>最終更新時刻: 読み込み中...
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid mt-3">
        <!-- Loading Spinner -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">読み込み中...</span>
            </div>
            <p class="mt-3">予測データを読み込み中...</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="alert alert-danger d-none" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="error-text">予測データの取得に失敗しました</span>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="d-none">
            <!-- Tab Navigation -->
            <ul class="nav nav-tabs mb-4" id="prediction-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="today-tab" data-bs-toggle="tab" data-bs-target="#today-content" type="button" role="tab" aria-controls="today-content" aria-selected="true">
                        <i class="fas fa-calendar-day me-2"></i>本日分予測
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="past-tab" data-bs-toggle="tab" data-bs-target="#past-content" type="button" role="tab" aria-controls="past-content" aria-selected="false">
                        <i class="fas fa-calendar-alt me-2"></i>過去分予測
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="prediction-tab-content">
                <!-- Today Tab Content -->
                <div class="tab-pane fade show active" id="today-content" role="tabpanel" aria-labelledby="today-tab">
                    <!-- Summary Section -->
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header bg-primary text-white">
                                    <h5 class="card-title mb-0">
                                        <i class="fas fa-chart-line me-2"></i>集計サマリー
                                    </h5>
                                </div>
                                <div class="card-body" id="summary-section">
                                    <!-- 集計サマリー・日付・モデル情報を表示 -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Venue Filter -->
                    <div class="row mb-3">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body">
                                    <div class="row align-items-center">
                                        <div class="col-md-6">
                                            <label for="venue-filter" class="form-label">
                                                <i class="fas fa-filter me-2"></i>会場フィルター
                                            </label>
                                            <select class="form-select" id="venue-filter">
                                                <option value="">全会場</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="risk-filter" class="form-label">
                                                <i class="fas fa-shield-alt me-2"></i>リスクレベル
                                            </label>
                                            <select class="form-select" id="risk-filter">
                                                <option value="">すべて</option>
                                                <option value="LOW">低リスク</option>
                                                <option value="MEDIUM">中リスク</option>
                                                <option value="HIGH">高リスク</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Venues Section -->
                    <div class="row">
                        <div class="col-12">
                            <div id="venues-section">
                                <!-- 会場ごとのレースリストを動的に挿入 -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Past Tab Content -->
                <div class="tab-pane fade" id="past-content" role="tabpanel" aria-labelledby="past-tab">
                    <!-- Past Loading Spinner -->
                    <div id="past-loading" class="text-center py-5 d-none">
                        <div class="spinner-border text-secondary" role="status">
                            <span class="visually-hidden">読み込み中...</span>
                        </div>
                        <p class="mt-3">過去分予測データを読み込み中...</p>
                    </div>

                    <!-- Past Error Message -->
                    <div id="past-error-message" class="alert alert-danger d-none" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span id="past-error-text">過去分予測データの取得に失敗しました</span>
                    </div>

                    <!-- Date Selection -->
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header bg-secondary text-white">
                                    <h5 class="card-title mb-0">
                                        <i class="fas fa-calendar me-2"></i>過去分予測データ選択
                                    </h5>
                                </div>
                                <div class="card-body">
                                    <div class="row align-items-center">
                                        <div class="col-md-6">
                                            <label for="past-date-selector" class="form-label">
                                                <i class="fas fa-calendar-day me-2"></i>予測日選択
                                            </label>
                                            <input type="date" class="form-control" id="past-date-selector">
                                        </div>
                                        <div class="col-md-6">
                                            <button class="btn btn-primary mt-4" id="load-past-predictions">
                                                <i class="fas fa-search me-2"></i>予測データ読み込み
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Past Predictions Content -->
                    <div id="past-predictions-content" class="d-none">
                        <!-- Past Summary Section -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header bg-secondary text-white">
                                        <h5 class="card-title mb-0">
                                            <i class="fas fa-chart-line me-2"></i>過去分集計サマリー
                                        </h5>
                                    </div>
                                    <div class="card-body" id="past-summary-section">
                                        <!-- 過去分の集計サマリーを表示 -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Past Venue Filter -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-body">
                                        <div class="row align-items-center">
                                            <div class="col-md-6">
                                                <label for="past-venue-filter" class="form-label">
                                                    <i class="fas fa-filter me-2"></i>会場フィルター
                                                </label>
                                                <select class="form-select" id="past-venue-filter">
                                                    <option value="">全会場</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label for="past-risk-filter" class="form-label">
                                                    <i class="fas fa-shield-alt me-2"></i>リスクレベル
                                                </label>
                                                <select class="form-select" id="past-risk-filter">
                                                    <option value="">すべて</option>
                                                    <option value="LOW">低リスク</option>
                                                    <option value="MEDIUM">中リスク</option>
                                                    <option value="HIGH">高リスク</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Past Venues Section -->
                        <div class="row">
                            <div class="col-12">
                                <div id="past-venues-section">
                                    <!-- 過去分の会場ごとのレースリストを動的に挿入 -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- No Past Data Message -->
                    <div id="no-past-data" class="text-center py-5">
                        <i class="fas fa-calendar-times fa-3x text-muted mb-3"></i>
                        <h4 class="text-muted">過去分予測データがありません</h4>
                        <p class="text-muted">日付を選択して「予測データ読み込み」ボタンを押してください。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/kyotei_predictor/static/js/predictions.js"></script>
    <!-- Initialize PredictionsViewer -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing PredictionsViewer...');
            try {
                window.predictionsViewer = new PredictionsViewer();
                console.log('PredictionsViewer initialized successfully');
            } catch (error) {
                console.error('Failed to initialize PredictionsViewer:', error);
            }
        });
    </script>
</body>
</html>
