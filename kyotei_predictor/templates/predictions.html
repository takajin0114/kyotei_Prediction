<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>競艇予測結果表示</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/predictions.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-ship me-2"></i>競艇予測結果
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text" id="last-updated">
                    <i class="fas fa-clock me-1"></i>更新時刻: 読み込み中...
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid mt-3">
        <!-- Loading Spinner -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">読み込み中...</span>
            </div>
            <p class="mt-3">予測データを読み込み中...</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="alert alert-danger d-none" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="error-text">予測データの取得に失敗しました</span>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="d-none">
            <!-- Summary Section -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-chart-line me-2"></i>実行サマリー
                            </h5>
                        </div>
                        <div class="card-body" id="summary-section">
                            <!-- 実行サマリー・日付・モデル情報を表示 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Venue Filter -->
            <div class="row mb-3">
                <div class="col-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-6">
                                    <label for="venue-filter" class="form-label">
                                        <i class="fas fa-filter me-2"></i>会場フィルター
                                    </label>
                                    <select class="form-select" id="venue-filter">
                                        <option value="">全会場</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="risk-filter" class="form-label">
                                        <i class="fas fa-shield-alt me-2"></i>リスクレベル
                                    </label>
                                    <select class="form-select" id="risk-filter">
                                        <option value="">全て</option>
                                        <option value="LOW">低リスク</option>
                                        <option value="MEDIUM">中リスク</option>
                                        <option value="HIGH">高リスク</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Venues Section -->
            <div class="row">
                <div class="col-12">
                    <div id="venues-section">
                        <!-- 会場ごとのレースリストを動的に挿入 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/predictions.js"></script>
</body>
</html>
