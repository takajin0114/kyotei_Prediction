<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競艇予測ツール - Phase 2</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-color: #0066cc;
            --secondary-color: #004499;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 15px;
        }

        .algorithm-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .algorithm-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .algorithm-card.selected {
            border: 3px solid var(--primary-color);
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        }

        .prediction-result {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border-left: 5px solid var(--success-color);
        }

        .racer-row {
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .racer-row:hover {
            background: rgba(0, 102, 204, 0.1);
        }

        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffed4e); }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #daa520); }

        .rating-a1 { color: #dc3545; font-weight: bold; }
        .rating-a2 { color: #fd7e14; font-weight: bold; }
        .rating-b1 { color: #198754; }
        .rating-b2 { color: #6c757d; }

        .confidence-high { color: var(--success-color); }
        .confidence-medium { color: var(--warning-color); }
        .confidence-low { color: var(--danger-color); }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .trifecta-section {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }

        .combination-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid var(--info-color);
            transition: all 0.3s ease;
        }

        .combination-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-tabs .nav-link {
            border-radius: 10px 10px 0 0;
            margin-right: 5px;
        }

        .nav-tabs .nav-link.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-predict {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
        }

        .weather-info {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        @media (max-width: 768px) {
            .main-container {
                margin: 10px;
                padding: 20px;
            }
            
            .algorithm-card {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="main-container">
            <!-- ヘッダー -->
            <div class="header-section">
                <h1><i class="fas fa-ship"></i> 競艇予測ツール</h1>
                <p class="mb-0">Phase 2: 中級アルゴリズム + 3連単確率計算</p>
                <small>5つのアルゴリズムによる多角的予測</small>
            </div>

            <!-- ナビゲーションタブ -->
            <ul class="nav nav-tabs" id="mainTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="prediction-tab" data-bs-toggle="tab" data-bs-target="#prediction" type="button" role="tab">
                        <i class="fas fa-chart-line"></i> 予測実行
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="trifecta-tab" data-bs-toggle="tab" data-bs-target="#trifecta" type="button" role="tab">
                        <i class="fas fa-trophy"></i> 3連単確率
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button" role="tab">
                        <i class="fas fa-history"></i> 予想履歴
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="analysis-tab" data-bs-toggle="tab" data-bs-target="#analysis" type="button" role="tab">
                        <i class="fas fa-chart-bar"></i> 分析
                    </button>
                </li>
            </ul>

            <!-- タブコンテンツ -->
            <div class="tab-content" id="mainTabContent">
                <!-- 予測実行タブ -->
                <div class="tab-pane fade show active" id="prediction" role="tabpanel">
                    <!-- レース選択セクション -->
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card algorithm-card">
                                <div class="card-header bg-info text-white">
                                    <h5><i class="fas fa-list"></i> レース選択</h5>
                                </div>
                                <div class="card-body">
                                    <div class="row align-items-center">
                                        <div class="col-md-8">
                                            <select id="raceSelector" class="form-select">
                                                <option value="">レースを選択してください...</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <button id="loadRaceBtn" class="btn btn-primary w-100" disabled>
                                                <i class="fas fa-download"></i> レースデータ読み込み
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row mt-4">
                        <!-- レース情報 -->
                        <div class="col-md-4">
                            <div class="card algorithm-card">
                                <div class="card-header bg-primary text-white">
                                    <h5><i class="fas fa-info-circle"></i> レース情報</h5>
                                </div>
                                <div class="card-body" id="raceInfo">
                                    <div class="text-center text-muted">
                                        <i class="fas fa-arrow-up fa-2x mb-3"></i>
                                        <p>上記からレースを選択してください</p>
                                    </div>
                                </div>
                            </div>

                            <!-- アルゴリズム選択 -->
                            <div class="card algorithm-card">
                                <div class="card-header bg-secondary text-white">
                                    <h5><i class="fas fa-cogs"></i> アルゴリズム選択</h5>
                                </div>
                                <div class="card-body">
                                    <div class="algorithm-options">
                                        <div class="form-check algorithm-option" data-algorithm="basic">
                                            <input class="form-check-input" type="radio" name="algorithm" id="basic" value="basic" checked>
                                            <label class="form-check-label" for="basic">
                                                <strong>Basic</strong><br>
                                                <small class="text-muted">シンプル勝率ベース</small>
                                            </label>
                                        </div>
                                        <div class="form-check algorithm-option" data-algorithm="rating_weighted">
                                            <input class="form-check-input" type="radio" name="algorithm" id="rating_weighted" value="rating_weighted">
                                            <label class="form-check-label" for="rating_weighted">
                                                <strong>Rating Weighted</strong><br>
                                                <small class="text-muted">級別重み付け</small>
                                            </label>
                                        </div>
                                        <div class="form-check algorithm-option" data-algorithm="equipment_focused">
                                            <input class="form-check-input" type="radio" name="algorithm" id="equipment_focused" value="equipment_focused">
                                            <label class="form-check-label" for="equipment_focused">
                                                <strong>Equipment Focused</strong> <span class="badge bg-success">NEW</span><br>
                                                <small class="text-muted">機材重視</small>
                                            </label>
                                        </div>
                                        <div class="form-check algorithm-option" data-algorithm="comprehensive">
                                            <input class="form-check-input" type="radio" name="algorithm" id="comprehensive" value="comprehensive">
                                            <label class="form-check-label" for="comprehensive">
                                                <strong>Comprehensive</strong> <span class="badge bg-success">NEW</span><br>
                                                <small class="text-muted">総合評価</small>
                                            </label>
                                        </div>
                                        <div class="form-check algorithm-option" data-algorithm="relative_strength">
                                            <input class="form-check-input" type="radio" name="algorithm" id="relative_strength" value="relative_strength">
                                            <label class="form-check-label" for="relative_strength">
                                                <strong>Relative Strength</strong> <span class="badge bg-success">NEW</span><br>
                                                <small class="text-muted">相対評価</small>
                                            </label>
                                        </div>
                                    </div>
                                    <button class="btn btn-predict btn-primary w-100 mt-3" onclick="executePrediction()">
                                        <i class="fas fa-play"></i> 予測実行
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 予測結果 -->
                        <div class="col-md-8">
                            <div class="loading-spinner" id="loadingSpinner">
                                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                                    <span class="visually-hidden">予測中...</span>
                                </div>
                                <h5 class="mt-3">予測計算中...</h5>
                            </div>

                            <div id="predictionResults" style="display: none;">
                                <!-- 予測結果がここに表示される -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3連単確率タブ -->
                <div class="tab-pane fade" id="trifecta" role="tabpanel">
                    <div class="trifecta-section mt-4">
                        <h4><i class="fas fa-trophy"></i> 3連単確率計算</h4>
                        <p class="text-muted">選択したアルゴリズムで3連単の確率を計算し、上位組み合わせを表示します。</p>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <label for="trifectaAlgorithm" class="form-label">アルゴリズム選択</label>
                                <select class="form-select" id="trifectaAlgorithm">
                                    <option value="comprehensive">Comprehensive (総合評価)</option>
                                    <option value="basic">Basic (基本)</option>
                                    <option value="rating_weighted">Rating Weighted (級別重み付け)</option>
                                    <option value="equipment_focused">Equipment Focused (機材重視)</option>
                                    <option value="relative_strength">Relative Strength (相対評価)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="topN" class="form-label">表示件数</label>
                                <select class="form-select" id="topN">
                                    <option value="10">上位10位</option>
                                    <option value="20">上位20位</option>
                                    <option value="30">上位30位</option>
                                </select>
                            </div>
                        </div>
                        
                        <button class="btn btn-predict btn-warning mt-3" onclick="calculateTrifecta()">
                            <i class="fas fa-calculator"></i> 3連単確率計算
                        </button>

                        <div id="trifectaResults" class="mt-4" style="display: none;">
                            <!-- 3連単結果がここに表示される -->
                        </div>
                    </div>
                </div>

                <!-- 予想履歴タブ -->
                <div class="tab-pane fade" id="history" role="tabpanel">
                    <div class="mt-4">
                        <h4><i class="fas fa-history"></i> 予想履歴</h4>
                        <div id="historyResults">
                            <!-- 履歴がここに表示される -->
                        </div>
                    </div>
                </div>

                <!-- 分析タブ -->
                <div class="tab-pane fade" id="analysis" role="tabpanel">
                    <div class="mt-4">
                        <h4><i class="fas fa-chart-bar"></i> 分析</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <canvas id="winRateChart"></canvas>
                            </div>
                            <div class="col-md-6">
                                <canvas id="algorithmChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- カスタムJavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
